<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Aposentadoria</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h2>Simulador de Aposentadoria</h2>
        <form id="calc-form">
          <div class="form-group">
            <label for="age">Idade:</label>
            <input type="number" id="age" placeholder="Ex: 65" />
          </div>

          <div class="form-group">
            <label for="time">Tempo de contribuição (anos):</label>
            <input type="number" id="time" placeholder="Ex: 30" />
          </div>

          <p class="message-retirement"></p>

          <button type="submit" id="send-button">Verificar Agora</button>
        </form>
      </section>

      <section class="card">
        <h2>Cálculo IMC</h2>
        <form id="imc-form">
          <div class="form-group">
            <label for="height">Altura:</label>
            <input type="text" id="height" placeholder="Ex: 1,80" />
          </div>

          <div class="form-group">
            <label for="weight">Peso:</label>
            <input type="text" id="weight" placeholder="Ex: 80" />
          </div>

          <p class="message-imc"></p>

          <button type="submit" id="send-button">Verificar Agora</button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
