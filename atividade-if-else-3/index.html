<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Notas - Else If</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #e9ecef;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        width: 320px;
        text-align: center;
      }
      h2 {
        color: #333;
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 15px;
        text-align: left;
      }
      label {
        display: block;
        margin-bottom: 5px;
        color: #555;
        font-size: 0.9rem;
      }
      input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 1rem;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: bold;
        transition: background 0.3s;
      }
      button:hover {
        background-color: #218838;
      }
      #result {
        margin-top: 20px;
        font-weight: bold;
        min-height: 40px;
        padding: 10px;
        border-radius: 4px;
      }
      .error {
        color: #721c24;
        background-color: #f8d7da;
      }
      .aprovado {
        color: #155724;
        background-color: #d4edda;
      }
      .recuperacao {
        color: #856404;
        background-color: #fff3cd;
      }
      .reprovado {
        color: #721c24;
        background-color: #f8d7da;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Média Escolar</h2>
      <form id="notaForm">
        <div class="form-group">
          <label>Nota 1:</label>
          <input type="text" id="n1" placeholder="0 a 10" />
        </div>
        <div class="form-group">
          <label>Nota 2:</label>
          <input type="text" id="n2" placeholder="0 a 10" />
        </div>
        <div class="form-group">
          <label>Nota 3:</label>
          <input type="text" id="n3" placeholder="0 a 10" />
        </div>
        <button type="submit">Calcular Resultado</button>
      </form>
      <div id="result"></div>
    </div>

    <script>
      const form = document.getElementById("notaForm");
      const resultDiv = document.getElementById("result");

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        resultDiv.className = "";

        const v1 = document.getElementById("n1").value.trim().replace(",", ".");
        const v2 = document.getElementById("n2").value.trim().replace(",", ".");
        const v3 = document.getElementById("n3").value.trim().replace(",", ".");

        if (
          v1 === "" ||
          v2 === "" ||
          v3 === "" ||
          isNaN(v1) ||
          isNaN(v2) ||
          isNaN(v3)
        ) {
          resultDiv.innerHTML =
            "Erro: Preencha todos os campos com números válidos!";
          resultDiv.classList.add("error");
          return;
        }

        const n1 = parseFloat(v1);
        const n2 = parseFloat(v2);
        const n3 = parseFloat(v3);

        if (n1 < 0 || n1 > 10 || n2 < 0 || n2 > 10 || n3 < 0 || n3 > 10) {
          resultDiv.innerHTML = "Erro: As notas devem estar entre 0 e 10!";
          resultDiv.classList.add("error");
          return;
        }

        const media = (n1 + n2 + n3) / 3;

        if (media >= 7) {
          resultDiv.innerHTML = `Média: ${media.toFixed(1)} <br> Aprovado!`;
          resultDiv.classList.add("aprovado");
        } else if (media >= 5) {
          resultDiv.innerHTML = `Média: ${media.toFixed(1)} <br> Recuperação`;
          resultDiv.classList.add("recuperacao");
        } else {
          resultDiv.innerHTML = `Média: ${media.toFixed(1)} <br> Reprovado`;
          resultDiv.classList.add("reprovado");
        }
      });

      form.addEventListener("input", () => {
        resultDiv.innerHTML = "";
        resultDiv.className = "";
      });
    </script>
  </body>
</html>
