<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Introdução Javascript</title>
  </head>
  <body>
    <!doctype html>
    <html lang="pt-br">
      <head>
        <meta charset="UTF-8" />
        <title>Introdução ao JavaScript</title>
        <style>
          body {
            font-family: sans-serif;
            padding: 20px;
            line-height: 1.6;
          }
          button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
          }
          button:hover {
            background-color: #0056b3;
          }
          h2 {
            color: #333;
          }
        </style>
      </head>
      <body>
        <h1>Minha Primeira Atividade JS</h1>

        <button onclick="boasVindas()">Clique aqui para Boas-Vindas</button>

        <hr />

        <script>
          function boasVindas() {
            alert("Seja muito bem-vindo ao meu site!");
          }

          let num1 = Number(prompt("Digite o primeiro número:"));
          let num2 = Number(prompt("Digite o segundo número:"));

          let soma = num1 + num2;
          let sub = num1 - num2;
          let mult = num1 * num2;
          let div = num1 / num2;

          console.log("--- Resultados dos Cálculos ---");
          console.log("Soma: " + soma);
          console.log("Subtração: " + sub);
          console.log("Multiplicação: " + mult);
          console.log("Divisão: " + div);

          document.write("<h2>Resultados das Operações:</h2>");
          document.write(
            "<p>O primeiro número digitado foi: <b>" + num1 + "</b></p>",
          );
          document.write(
            "<p>O segundo número digitado foi: <b>" + num2 + "</b></p>",
          );
          document.write("<ul>");
          document.write("<li>A soma é: " + soma + "</li>");
          document.write("<li>A subtração é: " + sub + "</li>");
          document.write("<li>A multiplicação é: " + mult + "</li>");
          document.write("<li>A divisão é: " + div + "</li>");
          document.write("</ul>");
        </script>
      </body>
    </html>
  </body>
</html>
