<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Switch Case</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section class="card">
        <h2>Pagamento</h2>
        <form>
          <div class="form-group">
            <label for="price">Valor total a ser pago:</label>
            <input type="number" id="price" placeholder="Ex: 65" />
          </div>

          <div class="form-group payment-group">
            <p>Forma de pagamento:</p>

            <div class="radio-option">
              <input type="radio" id="pix" name="payment" value="0.9" checked />
              <label for="pix">Dinheiro/PIX (10% de desconto)</label>
            </div>

            <div class="radio-option">
              <input type="radio" id="debito" name="payment" value="0.95" />
              <label for="debito">Débito (5% de desconto)</label>
            </div>

            <div class="radio-option">
              <input type="radio" id="credito" name="payment" value="1" />
              <label for="credito">Crédito (Valor Total)</label>
            </div>
          </div>

          <p class="message"></p>

          <button type="submit" id="send-button">Verificar Agora</button>
        </form>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
