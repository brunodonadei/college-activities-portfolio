<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Cotação do Dólar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
      }

      .card-custom {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        padding: 30px;
        backdrop-filter: blur(10px);
        text-align: center;
        width: 100%;
        max-width: 400px;
      }

      .valor {
        font-size: 2rem;
        font-weight: bold;
      }

      .label {
        opacity: 0.8;
      }

      button {
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="card-custom shadow">
      <h2>Cotação do Dólar</h2>

      <p class="label">Valor Atual</p>
      <p id="valor" class="valor">--</p>

      <p class="label">Maior do dia</p>
      <p id="max">--</p>

      <p class="label">Menor do dia</p>
      <p id="min">--</p>

      <button class="btn btn-light" onclick="buscarDolar()">Atualizar</button>
    </div>

    <script>
      async function buscarDolar() {
        try {
          const response = await fetch(
            "https://economia.awesomeapi.com.br/json/last/USD-BRL",
          );
          const data = await response.json();

          const dolar = data.USDBRL;

          document.getElementById("valor").innerText = parseFloat(
            dolar.bid,
          ).toFixed(2);

          document.getElementById("max").innerText = parseFloat(
            dolar.high,
          ).toFixed(2);

          document.getElementById("min").innerText = parseFloat(
            dolar.low,
          ).toFixed(2);
        } catch (erro) {
          alert("Erro ao buscar dados da API");
          console.error(erro);
        }
      }

      buscarDolar();
    </script>
  </body>
</html>
